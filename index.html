<!DOCTYPE html>
<html>
<body style="background-color: #0d0d0d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden;">
    <canvas id="canvas" width="500" height="500"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Config
        const HAIR_COLOR = '#F4D03F';
        const SKIN_COLOR = '#FAD7A0';
        const GI_COLOR = '#E67E22';
        const AURA_COLORS = ['#F1C40F', '#FFF176', '#FFFFFF', '#E74C3C', '#F39C12'];

        let frame = 0;
        const particles = [];
        const lightning = [];
        let shakeX = 0, shakeY = 0;

        // --- PARTICLE SYSTEM ---
        class Particle {
            constructor(preWarm = false) {
                this.init(preWarm);
            }

            init(preWarm = false) {
                this.x = 250 + (Math.random() - 0.5) * 120;
                this.y = preWarm ? 400 - Math.random() * 250 : 420;
                this.vx = (Math.random() - 0.5) * 2.5;
                this.vy = -(Math.random() * 6 + 2);
                this.size = Math.random() * 22 + 6;
                this.life = 1;
                this.decay = Math.random() * 0.025 + 0.008;
                this.color = AURA_COLORS[Math.floor(Math.random() * AURA_COLORS.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy *= 0.99;
                this.life -= this.decay;
                this.size *= 0.96;
                if (this.life <= 0 || this.size < 0.5) this.init();
            }

            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.globalAlpha = this.life * 0.85;
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        for (let i = 0; i < 120; i++) particles.push(new Particle(true));

        // --- AURA GLOW RING ---
        function drawAuraBase() {
            const pulse = Math.sin(frame * 0.08) * 15;
            const gradient = ctx.createRadialGradient(250, 380, 10, 250, 380, 120 + pulse);
            gradient.addColorStop(0, 'rgba(255, 220, 50, 0.45)');
            gradient.addColorStop(0.5, 'rgba(255, 150, 0, 0.2)');
            gradient.addColorStop(1, 'transparent');
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(250, 390, 110 + pulse, 70 + pulse * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
        }

        // --- LIGHTNING ---
        function spawnLightning() {
            if (Math.random() > 0.93) {
                const points = [];
                let lx = 250 + (Math.random() - 0.5) * 180;
                let ly = 460;
                for (let i = 0; i < 12; i++) {
                    lx += (Math.random() - 0.5) * 70;
                    ly -= Math.random() * 45 + 10;
                    points.push({ x: lx, y: ly });
                }
                lightning.push({ timer: 6, points });
            }
        }

        function drawLightning() {
            spawnLightning();
            for (let i = lightning.length - 1; i >= 0; i--) {
                const bolt = lightning[i];
                const alpha = bolt.timer / 6;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = '#88FFFF';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00FFFF';

                ctx.beginPath();
                ctx.moveTo(250 + (Math.random() - 0.5) * 60, 430);
                bolt.points.forEach(p => ctx.lineTo(p.x + (Math.random() - 0.5) * 4, p.y));
                ctx.stroke();

                // Inner white core
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.moveTo(250, 430);
                bolt.points.forEach(p => ctx.lineTo(p.x, p.y));
                ctx.stroke();

                ctx.restore();
                bolt.timer--;
                if (bolt.timer <= 0) lightning.splice(i, 1);
            }
        }

        // --- SCREEN SHAKE ---
        function updateShake() {
            if (frame % 3 === 0) {
                shakeX = (Math.random() - 0.5) * 2.5;
                shakeY = (Math.random() - 0.5) * 2.5;
            }
        }

        // --- CHARACTER ---
        function drawCharacter() {
            ctx.save();
            ctx.translate(250 + shakeX, 270 + shakeY);

            // HAIR — Super Saiyan Spikes
            ctx.fillStyle = HAIR_COLOR;
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#FFD700';
            ctx.beginPath();
            const spikes = [
                [-40, 50], [-70, 10], [-95, -50], [-55, -35],
                [-65, -100], [-10, -50], [35, -120], [55, -45],
                [95, -70], [75, -5], [95, 25], [55, 20], [40, 50]
            ];
            ctx.moveTo(-40, 50);
            spikes.forEach(([x, y]) => ctx.lineTo(x, y));
            ctx.closePath();
            ctx.fill();

            // HEAD
            ctx.fillStyle = SKIN_COLOR;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(0, 28, 44, 50, 0, 0, Math.PI * 2);
            ctx.fill();

            // Jaw shadow
            ctx.fillStyle = 'rgba(200, 150, 90, 0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 60, 30, 15, 0, 0, Math.PI);
            ctx.fill();

            // EYEBROWS
            ctx.fillStyle = HAIR_COLOR;
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#FFD700';
            [[−33, 8, −10, 18, −33, 17], [33, 8, 10, 18, 33, 17]].forEach(([x1,y1,x2,y2,x3,y3]) => {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineTo(x3, y3);
                ctx.fill();
            });

            // EYES
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00FFFF';
            [[-28, 24], [10, 24]].forEach(([ex, ey]) => {
                // White
                ctx.fillStyle = '#E8F8FF';
                ctx.fillRect(ex, ey, 20, 8);
                // Iris
                ctx.fillStyle = '#00CED1';
                ctx.beginPath();
                ctx.arc(ex + 10, ey + 4, 4, 0, Math.PI * 2);
                ctx.fill();
                // Pupil
                ctx.fillStyle = '#001a1a';
                ctx.beginPath();
                ctx.arc(ex + 10, ey + 4, 2, 0, Math.PI * 2);
                ctx.fill();
                // Outline
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 0;
                ctx.strokeRect(ex, ey, 20, 8);
            });

            // NOSE
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(180,120,80,0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(-5, 42); ctx.lineTo(-8, 50); ctx.lineTo(8, 50); ctx.lineTo(5, 42);
            ctx.stroke();

            // MOUTH — battle-gritted
            ctx.strokeStyle = '#8B0000';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(-12, 62);
            ctx.quadraticCurveTo(0, 58, 12, 62);
            ctx.stroke();
            // Teeth
            ctx.fillStyle = 'white';
            ctx.fillRect(-8, 58, 16, 4);

            // EAR
            [[-44, 25], [44, 25]].forEach(([ex, ey]) => {
                ctx.fillStyle = SKIN_COLOR;
                ctx.beginPath();
                ctx.ellipse(ex, ey, 8, 12, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            // NECK
            ctx.fillStyle = SKIN_COLOR;
            ctx.fillRect(-15, 75, 30, 20);

            // BODY — GI
            ctx.translate(0, 95);

            // Torso
            ctx.fillStyle = GI_COLOR;
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(255,150,0,0.4)';
            ctx.beginPath();
            ctx.moveTo(-45, 0);
            ctx.lineTo(45, 0);
            ctx.bezierCurveTo(55, 40, 58, 80, 55, 110);
            ctx.lineTo(-55, 110);
            ctx.bezierCurveTo(-58, 80, -55, 40, -45, 0);
            ctx.fill();

            // Undershirt V
            ctx.fillStyle = '#2471A3';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(-22, 0); ctx.lineTo(0, 28); ctx.lineTo(22, 0);
            ctx.fill();

            // Belt
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(-55, 85, 110, 12);
            ctx.fillStyle = '#888';
            ctx.fillRect(-8, 85, 16, 12);

            // LEFT ARM
            ctx.fillStyle = GI_COLOR;
            ctx.beginPath();
            ctx.moveTo(-45, 0);
            ctx.bezierCurveTo(-80, 10, -90, 60, -75, 110);
            ctx.lineTo(-60, 110);
            ctx.bezierCurveTo(-70, 60, -60, 15, -30, 10);
            ctx.fill();
            // Left fist
            ctx.fillStyle = SKIN_COLOR;
            ctx.beginPath();
            ctx.ellipse(-72, 115, 14, 12, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // RIGHT ARM — raised/powered
            ctx.fillStyle = GI_COLOR;
            ctx.beginPath();
            ctx.moveTo(45, 0);
            ctx.bezierCurveTo(80, -20, 100, 20, 85, 70);
            ctx.lineTo(70, 65);
            ctx.bezierCurveTo(82, 25, 65, -5, 30, 8);
            ctx.fill();
            // Right fist
            ctx.fillStyle = SKIN_COLOR;
            ctx.beginPath();
            ctx.ellipse(82, 72, 14, 12, 0.4, 0, Math.PI * 2);
            ctx.fill();

            // LEGS
            [[-28, 110], [5, 110]].forEach(([lx, ly], i) => {
                ctx.fillStyle = '#1B4F72';
                ctx.beginPath();
                ctx.moveTo(lx, ly);
                ctx.bezierCurveTo(lx - 5, ly + 50, lx - 3, ly + 80, lx, ly + 100);
                ctx.lineTo(lx + 23, ly + 100);
                ctx.bezierCurveTo(lx + 26, ly + 80, lx + 28, ly + 50, lx + 23, ly);
                ctx.fill();
                // Boot
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.roundRect(lx - 2, ly + 95, 27, 16, 4);
                ctx.fill();
            });

            ctx.restore();
        }

        // --- GROUND SHOCKWAVE ---
        function drawGroundEffect() {
            const pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
            ctx.globalAlpha = pulse * 0.4;
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#FFD700';

            for (let r = 1; r <= 3; r++) {
                const radius = (60 + r * 30) + Math.sin(frame * 0.15 + r) * 10;
                ctx.globalAlpha = (pulse * 0.35) / r;
                ctx.beginPath();
                ctx.ellipse(250, 460, radius, radius * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // --- MAIN LOOP ---
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updateShake();
            drawAuraBase();

            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => { p.update(); p.draw(); });
            ctx.globalCompositeOperation = 'source-over';

            drawGroundEffect();
            drawCharacter();
            drawLightning();

            frame++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
